<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yumvote · Dinner, decided.</title>
  <meta name="description" content="The household meal planner where everyone gets a vote. Plan together, vote on dinner, and shop from a list that writes itself." />
  <style>
    :root { --crimson: #DC2626; --ink: #0A0A0B; --ink2: #6B6B72; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--ink); background: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 48px 24px; }
    .logo { color: var(--crimson); font-weight: 800; font-size: 44px; letter-spacing: -0.03em; }
    h1 { font-size: 26px; margin-top: 18px; letter-spacing: -0.01em; }
    p { color: var(--ink2); font-size: 17px; margin-top: 10px; max-width: 420px; line-height: 1.6; }
    .soon { display: inline-block; margin-top: 26px; border: 1.5px solid var(--crimson); color: var(--crimson); border-radius: 999px; padding: 10px 22px; font-weight: 600; font-size: 15px; }
    footer { text-align: center; padding: 24px; color: var(--ink2); font-size: 13px; }
    footer a { color: var(--ink2); }
  </style>
</head>
<body>
  <main>
    <div class="logo">Yumvote</div>
    <h1>Dinner, decided.</h1>
    <p>The household meal planner where everyone gets a vote. Plan together, vote on what to eat, and shop from a list that writes itself.</p>
    <span class="soon">Coming soon to the App Store</span>
  </main>
  <footer>
    <a href="/privacy.html">Privacy Policy</a> · <a href="/terms.html">Terms of Use</a> · <a href="mailto:support@yumvote.app">support@yumvote.app</a>
    <div style="margin-top:6px">© 2026 Blinklabs Ltd</div>
  </footer>
</body>
</html>
